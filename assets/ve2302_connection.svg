<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff;">
  
  <defs>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
    </marker>
    
    <marker id="arrow-ctrl" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a" />
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    .node-rect { rx: 8; ry: 8; filter: url(#shadow); }
    .node-title { fill: #ffffff; font-size: 15px; font-weight: 600; text-anchor: middle; }
    .node-sub { fill: #e9ecef; font-size: 11px; font-family: monospace; text-anchor: middle; }
    .data-edge { fill: none; stroke: #2b8a3e; stroke-width: 3; marker-end: url(#arrow-data); marker-start: url(#arrow-data); }
    .ctrl-edge { fill: none; stroke: #c92a2a; stroke-width: 2; stroke-dasharray: 6 4; marker-end: url(#arrow-ctrl); }
    .edge-label-data { fill: #2b8a3e; font-size: 12px; font-weight: 600; font-family: monospace; }
    .edge-label-ctrl { fill: #c92a2a; font-size: 12px; font-weight: 600; font-family: monospace; }
  </style>

  <text x="500" y="40" font-size="22" font-weight="bold" fill="#343a40" text-anchor="middle">Versal Edge AI VE2302 Connection Diagram</text>

  <g transform="translate(80, 80)">
    <rect width="200" height="70" fill="#343a40" class="node-rect" />
    <text x="100" y="30" class="node-title">Versal CIPS (PS)</text>
    <text x="100" y="50" class="node-sub">ARM Cortex-A72 Host</text>
  </g>

  <g transform="translate(720, 80)">
    <rect width="200" height="70" fill="#343a40" class="node-rect" />
    <text x="100" y="30" class="node-title">External DDR Memory</text>
    <text x="100" y="50" class="node-sub">Integrated Memory Controller</text>
  </g>

  <g transform="translate(80, 240)">
    <rect width="840" height="60" fill="#868e96" class="node-rect" />
    <text x="420" y="35" class="node-title" font-size="18">Versal Network on Chip (NoC)</text>
  </g>

  <g transform="translate(50, 420)">
    <rect width="140" height="60" fill="#6741d9" class="node-rect" />
    <text x="70" y="28" class="node-title">RMSNorm CU</text>
    <text x="70" y="46" class="node-sub">Top: rmsnorm_cu</text>
  </g>

  <g transform="translate(230, 420)">
    <rect width="140" height="60" fill="#d9480f" class="node-rect" />
    <text x="70" y="28" class="node-title">RoPE + MHA CU</text>
    <text x="70" y="46" class="node-sub">Top: mha_cu</text>
  </g>

  <g transform="translate(410, 420)">
    <rect width="140" height="60" fill="#1971c2" class="node-rect" />
    <text x="70" y="28" class="node-title">GeMV CU 0</text>
    <text x="70" y="46" class="node-sub">Top: matmult_cu</text>
  </g>

  <g transform="translate(590, 420)">
    <rect width="140" height="60" fill="#1971c2" class="node-rect" />
    <text x="70" y="28" class="node-title">GeMV CU 1</text>
    <text x="70" y="46" class="node-sub">Top: matmult_cu</text>
  </g>

  <g transform="translate(770, 420)">
    <rect width="140" height="60" fill="#087f5b" class="node-rect" />
    <text x="70" y="28" class="node-title">SwiGLU CU</text>
    <text x="70" y="46" class="node-sub">Top: swiglu_cu</text>
  </g>

  <path class="ctrl-edge" d="M 180 150 L 180 240" />
  <text x="190" y="200" class="edge-label-ctrl">AXI4-Lite (Control)</text>

  <path class="data-edge" d="M 820 240 L 820 150" />
  <text x="835" y="200" class="edge-label-data">AXI4 (m_axi_gmem)</text>

  <path class="data-edge" d="M 100 420 L 100 300" />
  <path class="ctrl-edge" d="M 140 300 L 140 420" />
  <text x="45" y="340" class="edge-label-data" transform="rotate(-90, 45, 340)">m_axi</text>
  <text x="155" y="360" class="edge-label-ctrl" transform="rotate(-90, 155, 360)">s_axilite</text>

  <path class="data-edge" d="M 280 420 L 280 300" />
  <path class="ctrl-edge" d="M 320 300 L 320 420" />
  <text x="225" y="340" class="edge-label-data" transform="rotate(-90, 225, 340)">m_axi</text>
  <text x="335" y="360" class="edge-label-ctrl" transform="rotate(-90, 335, 360)">s_axilite</text>

  <path class="data-edge" d="M 460 420 L 460 300" />
  <path class="ctrl-edge" d="M 500 300 L 500 420" />
  <text x="405" y="340" class="edge-label-data" transform="rotate(-90, 405, 340)">m_axi</text>
  <text x="515" y="360" class="edge-label-ctrl" transform="rotate(-90, 515, 360)">s_axilite</text>

  <path class="data-edge" d="M 640 420 L 640 300" />
  <path class="ctrl-edge" d="M 680 300 L 680 420" />
  <text x="585" y="340" class="edge-label-data" transform="rotate(-90, 585, 340)">m_axi</text>
  <text x="695" y="360" class="edge-label-ctrl" transform="rotate(-90, 695, 360)">s_axilite</text>

  <path class="data-edge" d="M 820 420 L 820 300" />
  <path class="ctrl-edge" d="M 860 300 L 860 420" />
  <text x="765" y="340" class="edge-label-data" transform="rotate(-90, 765, 340)">m_axi</text>
  <text x="875" y="360" class="edge-label-ctrl" transform="rotate(-90, 875, 360)">s_axilite</text>

  <g transform="translate(50, 530)">
    <rect width="320" height="50" fill="#f8f9fa" rx="4" stroke="#ced4da" stroke-width="1"/>
    <text x="10" y="20" font-size="12" font-weight="bold" fill="#495057">Legend:</text>
    
    <line x1="10" y1="35" x2="40" y2="35" stroke="#2b8a3e" stroke-width="3" marker-end="url(#arrow-data)"/>
    <text x="50" y="39" font-size="12" fill="#495057">Data / m_axi (Memory Mapped)</text>
    
    <line x1="210" y1="35" x2="240" y2="35" stroke="#c92a2a" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow-ctrl)"/>
    <text x="250" y="39" font-size="12" fill="#495057">Control / s_axilite</text>
  </g>

</svg>
